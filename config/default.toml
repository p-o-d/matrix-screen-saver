[display]
font = "monospace"
font_size = 60
fps = 60
scanlines = true
scanline_intensity = 0.30
chromatic_aberration = 0.004
debug_overlay = false

[rain]
speed = 0.5
density = 0.01
charset = "mixed"
drop_length_min = 5
drop_length_max = 15
depth_levels = 5
depth_scale_min = 0.35
depth_brightness_min = 0.25
cluster_strength = 0.2

[colors]
primary = "#00ff41"
background = "#000000"
glow = true
glow_intensity = 0.8

[idle]
timeout_seconds = 120
